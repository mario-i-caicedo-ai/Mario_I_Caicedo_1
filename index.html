<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario I. Caicedo | Physics, Math &amp; Coffee</title>
    <style>
        :root {
            --bg-main: #0f0f11;
            --bg-card: #151518;
            --border-color: #2d3748;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --accent-cyan: #00e5ff;
            --accent-magenta: #ff00ff;
            --accent-green: #00e676;
            --accent-blue: #0ea5e9;
            --color-youtube: #ff0000;
            --color-instagram: #e1306c;
        }

        body {
            margin: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            max-width: 1050px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* --- HERO SECTION --- */
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contenedor del Logo */
        .logo-container {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            border-radius: 50%;
            background-color: var(--bg-card);
            border: 2px solid var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Si no hay imagen, muestra este texto */
        .logo-placeholder {
            font-weight: 700;
            font-size: 24px;
            color: var(--accent-blue);
            letter-spacing: 1px;
        }

        header h1 {
            font-size: 36px;
            margin: 0 0 5px 0;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #f1f5f9;
        }

        header h2 {
            font-size: 18px;
            color: var(--accent-blue);
            margin: 0 0 25px 0;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .quote-box {
            font-style: italic;
            font-size: 16px;
            color: var(--text-muted);
            max-width: 700px;
            margin: 0 auto 25px auto;
            padding: 0 20px;
            border-left: 3px solid var(--accent-blue);
            text-align: left;
        }

        /* --- BOTONES DE REDES SOCIALES --- */
        .social-container {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.2s ease;
            color: #f1f5f9;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
        }

        .social-btn.youtube:hover {
            border-color: var(--color-youtube);
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.3);
            color: var(--color-youtube);
        }

        .social-btn.instagram:hover {
            border-color: var(--color-instagram);
            box-shadow: 0 0 12px rgba(225, 48, 108, 0.3);
            color: var(--color-instagram);
        }

        /* --- DOS COLUMNAS --- */
        .profile-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
            margin-bottom: 60px;
        }

        @media (max-width: 850px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
            .sidebar-info {
                order: -1;
            }
        }

        .main-narrative p {
            font-size: 16px;
            color: #cbd5e1;
            margin-bottom: 20px;
            text-align: justify;
        }

        .sidebar-info {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            align-self: start;
        }

        .sidebar-info h4 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            color: #f1f5f9;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-info ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-info li {
            font-size: 14px;
            margin-bottom: 12px;
            color: #cbd5e1;
        }

        /* --- SECCIÓN DEL SIMULADOR --- */
        .lab-section {
            border-top: 1px solid var(--border-color);
            padding-top: 50px;
            margin-top: 40px;
        }

        .lab-section h3 {
            font-size: 24px;
            color: #f1f5f9;
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
        }

        .lab-section .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 15px;
            margin-bottom: 35px;
        }

        .lab-layout {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 30px;
        }

        .canvas-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border-radius: 6px;
        }

        .panel-sidebar {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 25px;
            flex: 1;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            box-sizing: border-box;
            height: 550px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .explanation-zone h4 {
            font-size: 16px;
            margin-top: 0;
            margin-bottom: 15px;
            color: #f1f5f9;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .vector-item {
            margin-bottom: 15px;
            font-size: 13px;
            line-height: 1.4;
            color: #cbd5e1;
        }

        .vector-title {
            font-weight: 600;
            margin-bottom: 2px;
        }

        .controls button {
            background-color: var(--accent-blue);
            color: var(--bg-main);
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2);
        }

        .controls button:hover {
            background-color: #38bdf8;
            box-shadow: 0 4px 16px rgba(56, 189, 248, 0.4);
        }

        @media (max-width: 950px) {
            .lab-layout {
                flex-direction: column;
                align-items: center;
            }
            .panel-sidebar {
                height: auto;
                width: 550px;
            }
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
